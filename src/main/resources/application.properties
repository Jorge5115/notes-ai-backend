spring.application.name=notes-ai

server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/notes_ai?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:cambiaEstoPorUnaCadenaLargaYAleatoriaAntesDeSubirloAProduccion}
jwt.expiration=86400000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# OAuth2 - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# URL del frontend, a donde redirigir tras el login con Google
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Gemini - resumen de notas con IA
# Si no hay API key configurada, el servicio funciona en modo mock (sin llamar a la IA real)
groq.api-key=${GROQ_API_KEY:}
groq.model=llama-3.3-70b-versatile

logging.level.com.jorge.notesai=DEBUG